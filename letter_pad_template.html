<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akhar Light Letter Pad</title>
  <style>
    :root {
      --ink: #a33d3a;
      --line: rgba(163, 61, 58, 0.45);
      --line-strong: rgba(163, 61, 58, 0.72);
      --sheet: #f3ecdf;
    }

    @font-face { font-family: 'NotoSansGujaratiLocal'; src: local('Noto Sans Gujarati'), url('/fonts/NotoSansGujarati-Regular.ttf') format('truetype'); }
    .toolbar { position: fixed; top: 12px; right: 12px; background: #fff; padding: 8px; border-radius: 8px; box-shadow:0 6px 18px rgba(0,0,0,0.15); z-index:9999 }
    .toolbar button{ margin-left:6px;padding:6px 10px;border:1px solid #ddd;background:#fafafa;cursor:pointer;border-radius:4px }
    body, .sheet, .name, .tag, .addr { font-family: NotoSansGujaratiLocal, Georgia, 'Times New Roman', serif }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #1e1a16;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .sheet {
      width: min(210mm, 100%);
      min-height: 297mm;
      background: linear-gradient(180deg, #f5efe4 0%, var(--sheet) 100%);
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
      padding: 14mm 12mm 12mm;
      font-variant-numeric: lining-nums tabular-nums;
      font-feature-settings: "lnum" 1, "tnum" 1;
    }

    .top {
      border-bottom: 2px solid var(--line-strong);
      padding-bottom: 8px;
      margin-bottom: 14px;
    }

    .logo-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 2px;
    }

    .logo {
      width: 28px;
      height: 28px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      flex: none;
    }

    .name {
      margin: 0;
      width: 100%;
      text-align: center;
      text-transform: uppercase;
      font-size: clamp(26px, 3.2vw, 38px);
      letter-spacing: 0.6px;
      font-weight: 700;
      line-height: 1.05;
    }

    .tag {
      margin: 2px 0 6px;
      text-align: center;
      text-transform: uppercase;
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .addr {
      text-align: center;
      font-size: 13px;
      line-height: 1.35;
      font-weight: 600;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 16px;
    }

    .line-field {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 29px;
      font-size: 17px;
      font-weight: 700;
    }

    .line-field .label {
      min-width: 48px;
    }

    .line-field .value {
      flex: 1;
      border-bottom: 2px dotted var(--line-strong);
      min-height: 22px;
    }

    .letter-box {
      border: 1px solid var(--line);
      min-height: 178mm;
      padding: 10mm 9mm;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 80px 1fr;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .field-row .value {
      border-bottom: 1px solid var(--line);
      min-height: 22px;
    }

    .salutation,
    .closing {
      font-size: 16px;
      font-weight: 700;
      margin-top: 4px;
    }

    .body {
      border: 1px solid var(--line);
      min-height: 92mm;
      background-image: linear-gradient(to bottom, transparent 29px, var(--line) 30px);
      background-size: 100% 30px;
      padding: 6px 8px;
      line-height: 30px;
      font-size: 15px;
    }

    .sign-row {
      display: grid;
      grid-template-columns: 1fr 220px;
      margin-top: 8px;
      gap: 20px;
      align-items: end;
    }

    .sign-box {
      text-align: center;
      border-top: 1.5px solid var(--line-strong);
      padding-top: 5px;
      min-height: 40px;
      font-size: 15px;
      font-weight: 700;
    }

    .foot {
      margin-top: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      border-top: 2px solid var(--line-strong);
      padding-top: 7px;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .sheet { width: 210mm; min-height: 297mm; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button id="toggle-edit">Edit</button>
    <button id="print">Print / Save PDF</button>
  </div>
  <main class="sheet">
    <header class="top">
      <div class="logo-row">
        <div class="logo">S</div>
        <h1 class="name">Sanjay Dharmshibhai Chavda</h1>
      </div>
      <div class="tag">All Type of Electrical Works</div>
      <div class="addr">"KOMAL DEEP" Satya Narayan Nagar MainRoad, Near. BatukMaharaj Guaashala, Gandhigram, Rajkot.</div>
    </header>

    <section class="meta">
      <div class="line-field"><span class="label">Ref.</span><span class="value"></span></div>
      <div class="line-field"><span class="label">Date</span><span class="value"></span></div>
    </section>

    <section class="letter-box">
      <div class="field-row"><span>To,</span><span class="value"></span></div>
      <div class="field-row"><span>Address</span><span class="value"></span></div>
      <div class="field-row"><span>Mobile</span><span class="value"></span></div>
      <div class="field-row"><span>Subject</span><span class="value"></span></div>

      <div class="salutation">Dear Sir/Madam,</div>
      <div class="body"></div>

      <div class="closing">Thanking You,</div>
      <div class="sign-row">
        <div class="field-row"><span>Encl.</span><span class="value"></span></div>
        <div class="sign-box">Authorized Signatory</div>
      </div>
    </section>

    <footer class="foot">Call. +91 92274 20287, Email. aksharlight@yahoo.in</footer>
  </main>

  <script>
  (function(){
    const toggle = document.getElementById('toggle-edit');
    const printBtn = document.getElementById('print');
    let editing=false;
    function setEdit(on){
      document.querySelectorAll('.value, .body, .sign-box, .salutation, .closing').forEach(el=>{ el.contentEditable = on ? 'true' : 'false'; el.style.outline = on ? '1px dashed rgba(0,0,0,0.08)' : 'none' });
    }
    toggle.addEventListener('click', ()=>{ editing=!editing; setEdit(editing); toggle.textContent = editing ? 'Stop edit' : 'Edit'; });
    printBtn.addEventListener('click', ()=> window.print());
    setEdit(false);
  })();
  </script>
</body>
</html>
