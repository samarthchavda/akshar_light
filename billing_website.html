<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BillEasy - Professional Billing</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161923;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f2f7;
    --muted: #8892a4;
    --accent: #4f9cf9;
    --accent2: #a78bfa;
    --success: #34d399;
    --danger: #f87171;
    --warn: #fbbf24;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── AUTH ── */
  .auth-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: radial-gradient(ellipse at 30% 20%, rgba(79,156,249,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(167,139,250,0.10) 0%, transparent 60%),
                var(--bg);
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 48px 40px;
    width: 380px;
    animation: fadeUp .5s ease;
  }
  .brand { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--accent); margin-bottom: 8px; }
  .brand-sub { font-size: 13px; color: var(--muted); margin-bottom: 36px; }
  .tabs-auth { display: flex; gap: 4px; background: var(--surface2); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 28px; }
  .tab-auth { flex: 1; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--muted); transition: all .2s; border: none; background: none; }
  .tab-auth.active { background: var(--accent); color: #fff; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border .2s; }
  .field input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s; }
  .btn-primary:hover { opacity: .85; }
  .auth-msg { font-size: 13px; color: var(--danger); margin-top: 10px; text-align: center; }

  /* ── MAIN ── */
  .main-screen { display: flex; flex-direction: column; min-height: 100vh; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .user-badge {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; color: var(--muted);
  }
  .user-badge span { color: var(--text); font-weight: 500; }
  .btn-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 7px 14px; font-size: 13px; color: var(--muted); cursor: pointer; font-family: inherit; transition: all .2s; }
  .btn-sm:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger-sm { border-color: rgba(248,113,113,.3); color: var(--danger); }
  .btn-danger-sm:hover { background: rgba(248,113,113,.1); }

  .content { flex: 1; display: flex; gap: 0; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px; background: var(--surface); border-right: 1px solid var(--border);
    padding: 20px 12px; flex-shrink: 0;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--muted);
    transition: all .2s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left;
    font-family: inherit;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(79,156,249,.15); color: var(--accent); }
  .nav-icon { font-size: 16px; }
  .nav-section { font-size: 11px; color: var(--muted); padding: 12px 12px 6px; letter-spacing: 1px; text-transform: uppercase; }

  /* ── MAIN PANEL ── */
  .panel { flex: 1; padding: 28px; overflow-y: auto; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .panel-title { font-size: 22px; font-weight: 600; }
  .panel-sub { font-size: 14px; color: var(--muted); margin-top: 2px; }

  .btn-accent { background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .2s; display: flex; align-items: center; gap: 7px; }
  .btn-accent:hover { opacity: .85; }

  /* ── STATS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .stat-value { font-size: 26px; font-weight: 600; }
  .stat-value.green { color: var(--success); }
  .stat-value.blue { color: var(--accent); }
  .stat-value.purple { color: var(--accent2); }

  /* ── INVOICE LIST ── */
  .invoice-list { display: flex; flex-direction: column; gap: 10px; }
  .invoice-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 22px; display: flex; align-items: center; justify-content: space-between;
    transition: border-color .2s; cursor: pointer;
  }
  .invoice-card:hover { border-color: var(--border2); }
  .inv-left { display: flex; flex-direction: column; gap: 4px; }
  .inv-num { font-size: 14px; font-weight: 600; color: var(--accent); }
  .inv-client { font-size: 13px; color: var(--muted); }
  .inv-right { display: flex; align-items: center; gap: 16px; }
  .inv-amount { font-size: 16px; font-weight: 600; }
  .inv-date { font-size: 12px; color: var(--muted); }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
  .badge-gst { background: rgba(167,139,250,.15); color: var(--accent2); }
  .badge-nogst { background: rgba(136,146,164,.1); color: var(--muted); }
  .inv-actions { display: flex; gap: 8px; }
  .icon-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; font-size: 14px; }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.red:hover { border-color: var(--danger); color: var(--danger); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* ── INVOICE BUILDER ── */
  .builder { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; }
  .builder-section { margin-bottom: 28px; }
  .builder-section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 14px; outline: none; transition: border .2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface2); }

  /* ── ITEMS TABLE ── */
  .items-table { width: 100%; border-collapse: collapse; }
  .items-table th { font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .items-table td { padding: 10px; vertical-align: middle; }
  .items-table td input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; width: 100%; transition: border .2s; }
  .items-table td input:focus { border-color: var(--accent); }
  .item-total { font-size: 13px; font-weight: 600; color: var(--text); padding: 8px 10px; }
  .btn-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: all .2s; }
  .btn-remove:hover { color: var(--danger); background: rgba(248,113,113,.1); }
  .btn-add-row { background: none; border: 1px dashed var(--border2); border-radius: 8px; padding: 10px; width: 100%; color: var(--muted); cursor: pointer; font-family: inherit; font-size: 13px; margin-top: 10px; transition: all .2s; }
  .btn-add-row:hover { border-color: var(--accent); color: var(--accent); }

  /* ── TOTALS ── */
  .totals-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 340px; margin-left: auto; }
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  .total-row.divider { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
  .total-row .label { color: var(--muted); }
  .total-row.grand { font-size: 18px; font-weight: 700; color: var(--accent); }

  .gst-toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .toggle-switch { position: relative; width: 44px; height: 24px; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--surface2); border-radius: 24px; cursor: pointer; transition: .3s; border: 1px solid var(--border2); }
  .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 2px; bottom: 2px; background: var(--muted); border-radius: 50%; transition: .3s; }
  .toggle-switch input:checked + .toggle-slider { background: rgba(79,156,249,.2); border-color: var(--accent); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); background: var(--accent); }
  .gst-label { font-size: 14px; font-weight: 500; }
  .gst-badge { font-size: 11px; background: rgba(167,139,250,.15); color: var(--accent2); padding: 3px 8px; border-radius: 10px; margin-left: 4px; }

  .builder-actions { display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end; }
  .btn-secondary { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 20px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; font-family: inherit; transition: all .2s; display: flex; align-items: center; gap: 7px; }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }

  /* ── PDF PREVIEW MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center;
    justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
    animation: fadeIn .2s ease;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 20px;
    width: 620px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
    animation: slideUp .3s ease;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 28px; border-bottom: 1px solid var(--border); }
  .modal-title { font-size: 18px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
  .modal-body { padding: 28px; }

  /* ── INVOICE PREVIEW ── */
  .preview-paper {
    background: #fff; border-radius: 12px; padding: 40px; color: #1a1a2e;
    font-family: 'DM Sans', sans-serif;
  }
  .preview-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
  .preview-brand { font-family: 'Playfair Display', serif; font-size: 28px; color: #4f9cf9; }
  .preview-tagline { font-size: 11px; color: #8892a4; margin-top: 2px; }
  .preview-inv-num { font-size: 13px; color: #8892a4; text-align: right; }
  .preview-inv-num strong { display: block; font-size: 20px; color: #1a1a2e; font-weight: 700; }
  .preview-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 32px; }
  .preview-party-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #8892a4; margin-bottom: 6px; font-weight: 600; }
  .preview-party-name { font-size: 16px; font-weight: 700; color: #1a1a2e; }
  .preview-party-info { font-size: 13px; color: #6b7280; line-height: 1.6; }
  .preview-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .preview-table th { background: #f8fafc; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: #8892a4; padding: 10px 14px; text-align: left; }
  .preview-table td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14px; color: #374151; }
  .preview-table td.num { text-align: right; }
  .preview-totals { max-width: 280px; margin-left: auto; }
  .preview-total-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; color: #6b7280; }
  .preview-total-row.grand { border-top: 2px solid #e5e7eb; margin-top: 4px; padding-top: 12px; font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .preview-gst-badge { display: inline-block; background: #ede9fe; color: #7c3aed; font-size: 11px; padding: 3px 10px; border-radius: 10px; margin-top: 16px; font-weight: 600; }
  .preview-footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #f0f0f0; text-align: center; font-size: 12px; color: #9ca3af; }

  .modal-footer { display: flex; gap: 12px; justify-content: flex-end; padding: 20px 28px; border-top: 1px solid var(--border); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--success);
    color: var(--success); padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
    z-index: 9999; animation: slideUp .3s ease;
  }
  .toolbar { position: fixed; top: 14px; right: 14px; z-index: 9999; background: #0b1220; border:1px solid rgba(255,255,255,0.06); padding:8px; border-radius:8px }
  .toolbar button{ background:transparent; border:1px solid rgba(255,255,255,0.04); color:var(--text); padding:6px 10px; border-radius:6px; margin-left:6px; cursor:pointer }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toolbar"><button id="toggle-edit">Edit</button><button id="print-doc">Print / Save PDF</button></div>

<script>
const $ = id => document.getElementById(id);
const el = (tag, props={}, ...children) => {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v]) => {
    if (k==='style' && typeof v==='object') Object.assign(e.style, v);
    else if (k==='class') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => c && e.appendChild(typeof c==='string' ? document.createTextNode(c) : c));
  return e;
};

// ── STATE ──
const USERS_KEY = 'billeasy_users';
const INVOICES_KEY = u => `billeasy_invoices_${u}`;

function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY)||'{}'); } catch { return {}; } }
function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }
function getInvoices(user) { try { return JSON.parse(localStorage.getItem(INVOICES_KEY(user))||'[]'); } catch { return []; } }
function saveInvoices(user, arr) { localStorage.setItem(INVOICES_KEY(user), JSON.stringify(arr)); }

let state = {
  user: null,
  view: 'dashboard', // dashboard | new | preview
  invoices: [],
  editingId: null,
  previewInvoice: null,
  authMode: 'login',
  toast: null,
  form: defaultForm(),
};

function defaultForm() {
  return {
    number: 'INV-' + Date.now().toString().slice(-5),
    date: new Date().toISOString().split('T')[0],
    dueDate: '',
    clientName: '', clientEmail: '', clientAddress: '',
    fromName: '', fromEmail: '', fromAddress: '',
    items: [{ id: 1, desc: '', qty: 1, price: 0 }],
    gst: false,
    notes: '',
    nextId: 2,
  };
}

// Toolbar: toggle form inputs editable and print
(function(){
  const t = document.getElementById('toggle-edit');
  const p = document.getElementById('print-doc');
  let editing=false;
  function setEditing(on){
    document.querySelectorAll('input, textarea, select, [contenteditable]').forEach(el=>{
      if(el.tagName==='INPUT' || el.tagName==='TEXTAREA' || el.tagName==='SELECT') el.disabled = !on;
      else el.contentEditable = on ? 'true' : 'false';
      if(on) el.style.outline='1px dashed rgba(255,255,255,0.06)'; else el.style.outline='none';
    });
  }
  t.addEventListener('click', ()=>{ editing=!editing; setEditing(editing); t.textContent = editing ? 'Stop edit' : 'Edit'; });
  p.addEventListener('click', ()=> window.print());
  setEditing(false);
})();

function render() {
  const app = $('app');
  app.innerHTML = '';
  if (!state.user) { app.appendChild(renderAuth()); }
  else {
    app.appendChild(renderMain());
    if (state.previewInvoice) app.appendChild(renderModal(state.previewInvoice));
  }
  if (state.toast) {
    const t = el('div', { class: 'toast' }, state.toast);
    app.appendChild(t);
    setTimeout(() => { state.toast = null; render(); }, 2500);
  }
}

// ── AUTH ──
function renderAuth() {
  const screen = el('div', { class: 'auth-screen' });
  const card = el('div', { class: 'auth-card' });
  const brand = el('div', { class: 'brand' }, '✦ BillEasy');
  const sub = el('div', { class: 'brand-sub' }, 'Professional billing made simple');

  const tabsDiv = el('div', { class: 'tabs-auth' });
  ['Login','Sign Up'].forEach((t,i) => {
    const mode = i===0 ? 'login' : 'signup';
    const tab = el('button', { class: 'tab-auth' + (state.authMode===mode ? ' active' : ''), onClick: () => { state.authMode = mode; render(); } }, t);
    tabsDiv.appendChild(tab);
  });

  const nameField = state.authMode==='signup' ? el('div', { class: 'field' },
    el('label', {}, 'Full Name'),
    el('input', { type:'text', id:'auth-name', placeholder:'Your name' })
  ) : null;

  const emailField = el('div', { class: 'field' },
    el('label', {}, 'Email'),
    el('input', { type:'email', id:'auth-email', placeholder:'email@example.com' })
  );
  const passField = el('div', { class: 'field' },
    el('label', {}, 'Password'),
    el('input', { type:'password', id:'auth-pass', placeholder:'••••••••' })
  );
  const msg = el('div', { class: 'auth-msg', id:'auth-msg' });

  const btn = el('button', { class: 'btn-primary', onClick: () => {
    const email = $('auth-email').value.trim();
    const pass = $('auth-pass').value;
    const users = getUsers();
    if (state.authMode==='login') {
      if (users[email] && users[email].pass===pass) {
        state.user = email; state.invoices = getInvoices(email); state.view = 'dashboard'; render();
      } else { $('auth-msg').textContent = 'Invalid email or password.'; }
    } else {
      const name = $('auth-name')?.value.trim() || email.split('@')[0];
      if (!email || !pass) { $('auth-msg').textContent = 'All fields required.'; return; }
      if (users[email]) { $('auth-msg').textContent = 'Email already exists.'; return; }
      users[email] = { name, pass };
      saveUsers(users);
      state.user = email; state.invoices = []; state.view = 'dashboard'; render();
    }
  }}, state.authMode==='login' ? 'Sign In' : 'Create Account');

  if (nameField) card.appendChild(nameField);
  [brand, sub, tabsDiv, emailField, passField, msg, btn].forEach(c => c && card.appendChild(c));
  screen.appendChild(card);
  return screen;
}

// ── MAIN ──
function renderMain() {
  const main = el('div', { class: 'main-screen' });

  // Topbar
  const users = getUsers();
  const uname = users[state.user]?.name || state.user;
  const topbar = el('div', { class: 'topbar' },
    el('div', { class: 'topbar-brand' }, '✦ BillEasy'),
    el('div', { class: 'topbar-right' },
      el('div', { class: 'user-badge' }, 'Logged in as ', el('span', {}, uname)),
      el('button', { class: 'btn-sm btn-danger-sm', onClick: () => { state.user=null; state.view='dashboard'; render(); } }, '↩ Logout')
    )
  );

  // Sidebar
  const navs = [
    { icon: '⊞', label: 'Dashboard', view: 'dashboard' },
    { icon: '✚', label: 'New Invoice', view: 'new' },
    { icon: '◩', label: 'All Invoices', view: 'list' },
  ];
  const sidebar = el('div', { class: 'sidebar' },
    el('div', { class: 'nav-section' }, 'Menu'),
    ...navs.map(n => el('button', {
      class: 'nav-item' + (state.view===n.view ? ' active' : ''),
      onClick: () => {
        if (n.view==='new') { state.form = defaultForm(); state.editingId = null; }
        state.view = n.view; render();
      }
    }, el('span', { class: 'nav-icon' }, n.icon), n.label))
  );

  const panel = el('div', { class: 'panel' });
  if (state.view==='dashboard') panel.appendChild(renderDashboard());
  else if (state.view==='new') panel.appendChild(renderBuilder());
  else if (state.view==='list') panel.appendChild(renderList());

  const content = el('div', { class: 'content' }, sidebar, panel);
  main.appendChild(topbar);
  main.appendChild(content);
  return main;
}

  ));

function editInvoice(inv) {
  state.form = {
    number: inv.number, date: inv.date, dueDate: inv.dueDate||'',

    fromName: inv.fromName, fromEmail: inv.fromEmail||'', fromAddress: inv.fromAddress||'',
    items: inv.items.map(i=>({...i})),
    gst: inv.gst, notes: inv.notes||'',
    nextId: Math.max(...inv.items.map(i=>i.id))+1,
  };
  state.editingId = inv.id;

function deleteInvoice(id) {
  state.invoices = state.invoices.filter(i=>i.id!==id);
  saveInvoices(state.user, state.invoices);

  // Items

  const table = el('table', { class: 'items-table' });
  table.appendChild(el('thead', {},
    el('tr', {},
      el('th', {}, 'Description'), el('th', {style:'width:90px'}, 'Qty'),
      el('th', {style:'width:110px'}, 'Price (₹)'), el('th', {style:'width:90px'}, 'Total'), el('th', {style:'width:36px'}, '')
    )
  ));

  const tbody = el('tbody', { id:'items-body' });
  function renderItems() {
    tbody.innerHTML = '';

        el('td', {}, (() => { const i=el('input',{type:'text',placeholder:'Item description',value:item.desc}); i.addEventListener('input',e=>{f.items[idx].desc=e.target.value;updateTotals();}); return i;})()),
        el('td', {}, (() => { const i=el('input',{type:'number',min:'0',value:item.qty,style:'text-align:center'}); i.addEventListener('input',e=>{f.items[idx].qty=parseFloat(e.target.value)||0;renderItems();updateTotals();}); return i;})()),
        el('td', {}, (() => { const i=el('input',{type:'number',min:'0',value:item.price,step:'0.01'}); i.addEventListener('input',e=>{f.items[idx].price=parseFloat(e.target.value)||0;renderItems();updateTotals();}); return i;})()),
        el('td', { class: 'item-total' }, '₹'+total.toFixed(2)),

      el('span', { class:'toggle-slider' })
    ),
    el('span', { class:'gst-label' }, 'Include GST'),
    el('span', { class:'gst-badge' }, '18%')
  );

  totalsSec.appendChild(el('div', { id:'totals-box' }));

  notesTA.textContent = f.notes;

  notesSec.appendChild(notesG);

  // Actions

    el('button', { class:'btn-accent', style:'background:var(--success)', onClick:()=>{ const inv=buildInvoiceObj(); if(!inv)return; state.previewInvoice=inv; render(); }}, '👁 Preview & PDF')

function updateTotals() {
  const box = $('totals-box');
  if (!box) return;
  const f = state.form;
  const sub = f.items.reduce((s,i)=>s+(i.qty*i.price),0);
  const gstAmt = f.gst ? sub*0.18 : 0;
  const grand = sub + gstAmt;

  box.innerHTML = '';
  const totals = el('div', { class:'totals-box' },
    el('div', { class:'total-row' }, el('span',{class:'label'},'Subtotal'), el('span',{},'₹'+sub.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}))),
  );
  if (f.gst) {
    totals.appendChild(el('div', { class:'total-row' }, el('span',{class:'label'},'GST (18%)'), el('span',{style:'color:var(--accent2)'},'₹'+gstAmt.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}))));
  }
  totals.appendChild(el('div', { class:'total-row divider grand' }, el('span',{},'Grand Total'), el('span',{},'₹'+grand.toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}))));
  box.appendChild(totals);
}

function buildInvoiceObj() {
  const f = state.form;
  const num = $('inv-num')?.value||f.number;
  const date = $('inv-date')?.value||f.date;
  const dueDate = $('inv-due')?.value||'';
  const fromName = $('from-name')?.value||'';
  const fromEmail = $('from-email')?.value||'';
  const fromAddress = $('from-addr')?.value||'';
  const clientName = $('to-name')?.value||'';
  const clientEmail = $('to-email')?.value||'';
  const clientAddress = $('to-addr')?.value||'';
  const notes = $('inv-notes')?.value||'';

  const sub = f.items.reduce((s,i)=>s+(i.qty*i.price),0);
  const gstAmt = f.gst ? sub*0.18 : 0;
  const grand = sub+gstAmt;

  return {
    id: state.editingId || Date.now(),
    number: num, date, dueDate, fromName, fromEmail, fromAddress,
    clientName, clientEmail, clientAddress,
    items: f.items.map(i=>({...i})),
    gst: f.gst, notes, sub, gstAmt, grand,
    user: state.user,
  };
}

function saveInvoice() {
  const inv = buildInvoiceObj();
  if (!inv) return;
  if (state.editingId) {
    state.invoices = state.invoices.map(i=>i.id===state.editingId ? inv : i);
  } else {
    state.invoices.push(inv);
  }
  saveInvoices(state.user, state.invoices);
  state.toast = state.editingId ? 'Invoice updated!' : 'Invoice saved!';
  state.editingId = null; state.view = 'list'; state.form = defaultForm();
  render();
}

// ── PDF ──
function downloadPDF(inv) {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    buildPDF(doc, inv);
    doc.save(`Invoice_${inv.number}.pdf`);
    state.toast = 'PDF downloaded!';
    render();
  } catch(e) { alert('PDF error: '+e.message); }
}

function shareInvoice(inv) {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    buildPDF(doc, inv);
    const blob = doc.output('blob');
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `Invoice_${inv.number}.pdf`;
    a.click();
    state.toast = 'PDF ready to share!';
    render();
  } catch(e) { alert('Share error: '+e.message); }
}

function buildPDF(doc, inv) {
  const W = doc.internal.pageSize.getWidth();
  let y = 20;

  doc.setFillColor(79,156,249); doc.rect(0,0,W,6,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor(79,156,249);
  doc.text('BillEasy', 15, y+8);
  doc.setFontSize(10); doc.setTextColor(150,150,150);
  doc.text('Professional Billing Solution', 15, y+15);
  doc.setFontSize(11); doc.setTextColor(30,30,30);
  doc.text(`Invoice: ${inv.number}`, W-15, y+8, {align:'right'});
  doc.text(`Date: ${inv.date}`, W-15, y+15, {align:'right'});
  if (inv.dueDate) doc.text(`Due: ${inv.dueDate}`, W-15, y+22, {align:'right'});

  y += 38;
  doc.setDrawColor(230,230,230); doc.line(15,y,W-15,y); y+=8;

  doc.setFontSize(9); doc.setTextColor(120,120,120); doc.setFont('helvetica','bold');
  doc.text('FROM', 15, y);
  doc.text('BILL TO', W/2, y);
  y+=6;
  doc.setFont('helvetica','normal'); doc.setTextColor(30,30,30); doc.setFontSize(11);
  doc.text(inv.fromName||'—', 15, y);
  doc.text(inv.clientName||'—', W/2, y);
  y+=5;
  doc.setFontSize(9); doc.setTextColor(100,100,100);
  if (inv.fromEmail) { doc.text(inv.fromEmail, 15, y); }
  if (inv.clientEmail) { doc.text(inv.clientEmail, W/2, y); }
  y+=4;
  if (inv.fromAddress) { doc.text(inv.fromAddress, 15, y); }
  if (inv.clientAddress) { doc.text(inv.clientAddress, W/2, y); }
  y+=12;

  doc.autoTable({
    startY: y,
    head: [['#','Description','Qty','Price (₹)','Total (₹)']],
    body: inv.items.map((it,i)=>[i+1, it.desc||'—', it.qty, Number(it.price).toFixed(2), (it.qty*it.price).toFixed(2)]),
    styles: { fontSize:10, cellPadding:5 },
    headStyles: { fillColor:[240,244,255], textColor:[79,99,149], fontStyle:'bold' },
    columnStyles: { 0:{cellWidth:12}, 2:{halign:'center'}, 3:{halign:'right'}, 4:{halign:'right'} },
    margin: { left:15, right:15 },
  });

  y = doc.lastAutoTable.finalY + 10;
  const rightX = W - 15; const labelX = W - 70;
  doc.setFontSize(10); doc.setTextColor(100,100,100);
  doc.text('Subtotal:', labelX, y, {align:'right'}); doc.text('₹'+inv.sub.toFixed(2), rightX, y, {align:'right'}); y+=7;
  if (inv.gst) {
    doc.setTextColor(120,80,220);
    doc.text('GST (18%):', labelX, y, {align:'right'}); doc.text('₹'+inv.gstAmt.toFixed(2), rightX, y, {align:'right'}); y+=7;
  }
  doc.setDrawColor(200,200,200); doc.line(labelX-10, y, rightX, y); y+=5;
  doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(30,30,30);
  doc.text('Grand Total:', labelX, y, {align:'right'}); doc.setTextColor(79,156,249); doc.text('₹'+inv.grand.toFixed(2), rightX, y, {align:'right'});

  if (inv.notes) {
    y+=14; doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(100,100,100);
    doc.text('Notes: '+inv.notes, 15, y);
  }
  if (inv.gst) {
    y+=10; doc.setFontSize(8); doc.setTextColor(120,80,220);
    doc.text('✓ GST Registered Invoice – 18% GST Applied', 15, y);
  }

  const pageH = doc.internal.pageSize.getHeight();
  doc.setFillColor(79,156,249); doc.rect(0,pageH-8,W,8,'F');
  doc.setFontSize(8); doc.setTextColor(255,255,255);
  doc.text('Generated by BillEasy • Thank you for your business!', W/2, pageH-3, {align:'center'});
}

render();
</script>
